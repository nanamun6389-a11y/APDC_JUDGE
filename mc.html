<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>APDC MC</title><link rel="stylesheet" href="style.css?v=5"></head><body>
<div class="all-events-script">
  <div class="ko">🎤 여러 연령 EVENT가 함께 진행됩니다. 심사위원께서는 표시된 각 EVENT를 개별 심사해 주세요.</div>
  <div class="en">🎤 Multiple events are running in this group. Please judge each event separately.</div>
</div>
<div id="nav"></div><main class="wrap"><section class="hero"><h1>MC Screen</h1><p>EVENT 단위로 현재 경기와 다음 경기를 안내합니다.</p></section><section class="panel"><div class="kicker" id="hno"></div><div class="bigtitle" id="title"></div><div class="badge" id="badge"></div><div id="events" class="group-events" style="margin-top:18px"></div><hr style="margin:24px 0;border:0;border-top:1px solid #ddd"><div class="mcbox" id="script"></div><div class="event-card" style="margin-top:22px"><b>NEXT</b><div class="meta" id="nextinfo"></div></div></section></main><script src="shared.js"></script><script>requireAdmin();</script><script>
document.getElementById('nav').innerHTML=nav('mc');let H=[],S=loadState();fetch('running_groups.json').then(r=>r.json()).then(x=>{H=x;render()});function render(){if(!H.length)return;let h=H[S.groupIndex||0];hno.textContent='CURRENT · EVENT '+String(h.groupNo).padStart(2,'0');title.textContent=h.dance+' · '+h.entryCount+' ON FLOOR';badge.textContent=statusText(S.status);events.innerHTML='<div style="font-weight:700;margin-bottom:10px">CURRENT EVENTS</div>'+h.events.map(e=>`<div class="group-event-row"><b>EVENT ${String(e.no).padStart(2,'0')}</b><span>${e.title}</span></div>`).join('');let ko='',en='';if(S.status==='LIVE'){ko='심사위원 여러분, EVENT '+h.groupNo+' 심사를 준비해 주시기 바랍니다.<br>선수 여러분, 플로어로 입장해 주세요.<br>준비되셨으면 경기를 시작하겠습니다.';en='Judges, please get ready for EVENT '+h.groupNo+'.<br>Players, please come onto the floor and take your places.<br>Thank you. When everyone is ready, we will begin this EVENT.';}else if(S.status==='FINISHED'){ko='EVENT '+h.groupNo+' 경기가 종료되었습니다.<br>선수 여러분께 큰 박수 부탁드립니다.<br>다음 EVENT를 준비하겠습니다.';en='EVENT '+h.groupNo+' is now finished.<br>Thank you to all the players. Please give them a big round of applause.<br>We will now move on and get ready for the next EVENT.';}else{ko='다음은 EVENT '+h.groupNo+'입니다.<br>심사위원 여러분, 심사를 준비해 주시기 바랍니다.<br>선수 여러분께서는 대기해 주세요.';en='Next is EVENT '+h.groupNo+'.<br>Judges, please get ready for the next EVENT.<br>Players, please stand by and be ready to enter the floor when called.';}script.innerHTML='<div class="ko"><b>Korean</b><br>'+ko+'</div><div class="en" style="margin-top:16px"><b>English</b><br>'+en+'</div>';let n=H[(S.groupIndex||0)+1];nextinfo.innerHTML=n?'<div><b>EVENT '+String(n.groupNo).padStart(2,'0')+' · '+n.dance+'</b></div>'+n.events.map(e=>`<div style="margin-top:6px">EVENT ${String(e.no).padStart(2,'0')} · ${e.title}</div>`).join(''):'END OF PROGRAM'}subscribeState(x=>{S=x;render()});
</script></body></html>
