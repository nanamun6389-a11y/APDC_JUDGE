<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>APDC Mini Judge</title><link rel="stylesheet" href="style.css?v=20260723-timetable-visible"></head><body><div class="top"><span>APDC MINI JUDGE</span><a href="index.html">HOME</a></div><main class="wrap"><h1>심사 화면</h1><p class="note">김태원 또는 최지혜 심사위원을 선택한 뒤 종목별 순위를 입력하세요.</p><section class="panel"><div class="judge-tabs"><button class="judge-tab active" data-judge="김태원">김태원</button><button class="judge-tab" data-judge="최지혜">최지혜</button></div><label><b>심사 종목</b></label><select id="eventSelect" class="judge-select"></select><div class="card"><div class="kicker" id="eventNo"></div><div class="title" id="eventTitle"></div><div class="sub" id="eventSub"></div></div><table class="score-table"><thead><tr><th>선수 / 커플</th><th>순위</th></tr></thead><tbody id="scoreBody"></tbody></table><button class="btn primary" id="saveBtn" style="width:100%;margin-top:16px">심사 저장</button><div class="save-msg" id="saveMsg"></div></section></main><script>
const SCORE_KEY='apdc-mini-judge-scores-v1';let events=[],selectedJudge='김태원';function loadScores(){try{return JSON.parse(localStorage.getItem(SCORE_KEY))||{}}catch(e){return{}}}function scoreKey(i){return selectedJudge+'__'+i}fetch('events.json').then(r=>r.json()).then(data=>{events=data;eventSelect.innerHTML=events.map((e,i)=>`<option value="${i}">${String(e.no).padStart(2,'0')}. ${e.title}${e.subtitle?' · '+e.subtitle:''}</option>`).join('');render()});document.querySelectorAll('.judge-tab').forEach(btn=>btn.onclick=()=>{selectedJudge=btn.dataset.judge;document.querySelectorAll('.judge-tab').forEach(x=>x.classList.toggle('active',x===btn));render()});eventSelect.onchange=render;function render(){if(!events.length)return;const idx=Number(eventSelect.value||0),ev=events[idx],all=loadScores(),saved=all[scoreKey(idx)]||{};eventNo.textContent='EVENT '+String(ev.no).padStart(2,'0');eventTitle.textContent=ev.title;eventSub.textContent=ev.subtitle||'';scoreBody.innerHTML=ev.competitors.map(name=>`<tr><td><b>${name}</b></td><td><input class="rank-input" type="number" min="1" max="${ev.competitors.length}" data-name="${name}" value="${saved[name]||''}" placeholder="순위"></td></tr>`).join('');saveMsg.textContent=''}saveBtn.onclick=()=>{const idx=Number(eventSelect.value||0),all=loadScores(),values={};document.querySelectorAll('.rank-input').forEach(input=>{if(input.value)values[input.dataset.name]=Number(input.value)});all[scoreKey(idx)]=values;localStorage.setItem(SCORE_KEY,JSON.stringify(all));saveMsg.textContent=selectedJudge+' 심사위원의 입력이 저장되었습니다.'};
</script></body></html>
