<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>APDC Mini Control</title><link rel="stylesheet" href="style.css?v=20260723-timetable-visible"></head><body>
<div class="top"><span>APDC MINI CONTROL</span><a href="index.html">HOME</a></div><main class="wrap"><h1>Sunday Trial Control</h1><p class="note">START / FINISH / NEXT로 현장 화면을 바꿉니다.</p>
<div class="grid"><section class="panel"><div class="card"><div class="kicker" id="eno"></div><div class="title" id="title"></div><div class="sub" id="subt"></div><div class="badge" id="badge"></div><div class="people" id="people"></div></div>
<div class="buttons"><button class="btn" id="prev">이전</button><button class="btn primary" id="start">START</button><button class="btn" id="finish">FINISH</button><button class="btn" id="next">NEXT</button></div><button class="btn" id="reset" style="width:100%;margin-top:8px">초기화</button>
<p class="note">같은 브라우저에서 Control과 LIVE를 각각 열면 즉시 동기화됩니다.</p></section><section class="panel"><h2>이벤트 목록</h2><div id="list"></div></section></div></main>
<script src="shared.js"></script><script>
let E=[],S=load();fetch('events.json').then(r=>r.json()).then(x=>{E=x;render()});
function render(){if(!E.length)return;let e=E[S.index];eno.textContent='EVENT '+String(e.no).padStart(2,'0');title.textContent=e.title;subt.textContent=e.subtitle;badge.textContent=st(S.status);people.innerHTML=e.competitors.map(x=>'<div class="person">'+x+'</div>').join('');prev.disabled=S.index===0;next.disabled=S.index===E.length-1;start.disabled=S.status==='LIVE';finish.disabled=S.status!=='LIVE';list.innerHTML=E.map((x,i)=>'<div class="item '+(i===S.index?'active':'')+'" data-i="'+i+'"><b>'+String(x.no).padStart(2,'0')+'. '+x.title+(x.subtitle?' · '+x.subtitle:'')+'</b><div class="note">'+x.competitors.length+' entries</div></div>').join('');document.querySelectorAll('.item').forEach(el=>el.onclick=()=>{S={index:+el.dataset.i,status:'READY'};save(S);render()})}
start.onclick=()=>{S.status='LIVE';save(S);render()};finish.onclick=()=>{S.status='FINISHED';save(S);render()};prev.onclick=()=>{if(S.index){S.index--;S.status='READY';save(S);render()}};next.onclick=()=>{if(S.index<E.length-1){S.index++;S.status='READY';save(S);render()}};reset.onclick=()=>{S=def();save(S);render()};sub(s=>{S=s;render()});
</script></body></html>
