<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>APDC Judge QR</title>
<link rel="stylesheet" href="style.css">
<style>
.qr-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:16px}
.qr-card{border:1px solid #000;padding:14px;text-align:center;break-inside:avoid}
.qr-card h3{margin:0 0 4px}.qr-name{font-size:13px;color:#555;margin-bottom:10px}
.qr-box{display:flex;justify-content:center}.qr-url{font-size:10px;word-break:break-all;margin-top:8px}
@media(max-width:700px){.qr-grid{grid-template-columns:1fr 1fr}}
@media print{header,.no-print{display:none}.qr-grid{grid-template-columns:repeat(3,1fr)}}
</style>
</head>
<body>
<header><div class="brand">APDC JUDGE QR</div><div class="sub">SCAN TO OPEN PERSONAL BALLOT</div></header>
<main>
<div class="no-print actions"><button class="primary" onclick="window.print()">PRINT / SAVE PDF</button></div>
<div id="qrGrid" class="qr-grid"></div>
</main>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
const judges = [{"code": "T1", "name": "Raymond KIM"}, {"code": "T2", "name": "Lorencia"}, {"code": "T3", "name": "Marcus"}, {"code": "T4", "name": "Crystal"}, {"code": "T5", "name": "Tomohiro"}, {"code": "T6", "name": "Annie Oo"}, {"code": "T7", "name": "Nancy Chang"}, {"code": "T8", "name": "Max Yim"}, {"code": "W1", "name": "이종률"}, {"code": "W2", "name": "김도영"}, {"code": "W3", "name": "엄혜리"}, {"code": "W4", "name": "구채림"}, {"code": "W5", "name": "고재호"}, {"code": "W6", "name": "임채성"}, {"code": "W7", "name": "은일"}, {"code": "W8", "name": "블라디"}, {"code": "W9", "name": "이세영"}];
const base = location.href.replace(/qr\.html.*$/,'index.html');
const grid = document.getElementById('qrGrid');
judges.forEach(j=>{
  const url = `${base}?judge=${encodeURIComponent(j.code)}`;
  const card=document.createElement('div');
  card.className='qr-card';
  card.innerHTML=`<h3>${j.code}</h3><div class="qr-name">${j.name}</div><div class="qr-box"></div><div class="qr-url">${url}</div>`;
  grid.appendChild(card);
  new QRCode(card.querySelector('.qr-box'),{text:url,width:150,height:150,colorDark:'#000000',colorLight:'#ffffff',correctLevel:QRCode.CorrectLevel.H});
});
</script>
</body>
</html>
