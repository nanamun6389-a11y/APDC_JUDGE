<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>APDC Admin Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header><div class="brand">APDC ADMIN</div><div class="sub">REAL-TIME JUDGING DASHBOARD</div></header>
<main>
<section class="connection"><span id="connectionDot" class="dot"></span><span id="connectionText">Connecting...</span></section>
<section class="admin-controls">
<label>SECTION<select id="adminEvent"></select></label>
<label>ROUND<select id="adminRound"><option value="quarter">Quarter Final</option><option value="semi">Semi Final</option><option value="final">Final</option></select></label>
<label>JUDGE GROUP<select id="judgeGroup"><option value="ALL">All Judges</option><option value="T">T Judges</option><option value="W">W Judges</option></select></label>
</section>
<section class="admin-buttons">
<button id="exportBtn" class="secondary">EXPORT CSV</button>
<button id="printBtn" class="secondary">PRINT / SAVE PDF</button>
<button id="clearBtn" class="danger">CLEAR CURRENT ROUND</button>
<a href="qr.html" class="admin-link-inline">JUDGE QR CODES</a>
</section>
<section>
<div class="score-head"><div><div id="adminTitle" class="event-title"></div><div id="submissionCount" class="round-title"></div></div><div id="completeBadge" class="complete-badge"></div></div>
<div id="judgeStatus"></div>
</section>
<section class="aggregate"><h2>AGGREGATED RESULTS</h2><div id="aggregateResults"></div></section>
<a class="admin-link" href="index.html">BACK TO JUDGE SCREEN</a>
</main>
<script type="module" src="admin.js"></script>
</body>
</html>
