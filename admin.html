<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#000000">
<title>APDC Admin</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header><a class="brand brand-link" href="index.html">APDC ADMIN</a></header>
<main>

<section id="adminPasswordGate" class="password-gate">
  <div class="password-box">
    <div class="small-label">APDC ADMIN ACCESS</div>
    <h1>ENTER PASSWORD</h1>
    <input id="adminPasswordInput" type="password" inputmode="numeric" maxlength="4" placeholder="••••" autocomplete="off">
    <button id="adminPasswordBtn" type="button">ENTER</button>
    <div id="adminPasswordMessage" class="message"></div>
  </div>
</section>

<div id="adminProtected" class="hidden">
  <section class="controls">
    <label>SECTION<select id="adminEvent"></select></label>
    <label>ROUND<select id="adminRound">
      <option value="quarter">Quarter Final</option>
      <option value="semi">Semi Final</option>
      <option value="final">Final</option>
    </select></label>
    <label>GROUP<select id="judgeGroup">
      <option value="ALL">All Judges</option>
      <option value="T">T Judges</option>
      <option value="W">W Judges</option>
    </select></label>
  </section>

  <section class="score">
    <div class="score-head">
      <div>
        <h1 id="adminTitle"></h1>
        <div id="submissionCount" class="muted"></div>
      </div>
      <div id="completeBadge" class="badge">IN PROGRESS</div>
    </div>

    <h2>JUDGES</h2>
    <div id="judgeStatus"></div>

    <h2>RESULT</h2>
    <div id="aggregateResults"></div>

    <div class="admin-actions">
      <button id="exportBtn" class="light">CSV</button>
      <button id="printBtn" class="light">PDF</button>
      <button id="clearBtn" class="light">RESET ROUND</button>
      <button id="resetAllBtn" class="danger">RESET ALL SUBMISSIONS</button>
    </div>
  </section>

  <nav class="bottom-nav">
    <a href="index.html">JUDGE</a>
    <a href="live.html">LIVE</a>
    <a href="qr.html">QR</a>
  </nav>
</div>

<section class="control-card on-deck-admin">
  <h2>FLOOR CONTROL</h2>
  <label>NOW</label><input id="nowEventInput" type="text" placeholder="e.g. Under 12 Solo CR">
  <label>ON DECK</label><input id="onDeckEventInput" type="text" placeholder="e.g. Under 12 Solo RJ">
  <label>NEXT</label><input id="nextEventInput" type="text" placeholder="e.g. Under 15 Solo C">
  <div class="control-grid">
    <button id="publishFloorBtn" type="button">PUBLISH</button>
    <button id="advanceFloorBtn" type="button" class="light">ADVANCE →</button>
  </div>
  <p id="floorMessage" class="message"></p>
</section>

</main>

<script>
const ADMIN_PASSWORD = "0322";
const adminGate = document.getElementById("adminPasswordGate");
const adminProtected = document.getElementById("adminProtected");
const adminPasswordInput = document.getElementById("adminPasswordInput");
const adminPasswordBtn = document.getElementById("adminPasswordBtn");
const adminPasswordMessage = document.getElementById("adminPasswordMessage");

function unlockAdmin() {
  sessionStorage.setItem("apdcAdminUnlocked", "yes");
  adminGate.classList.add("hidden");
  adminProtected.classList.remove("hidden");
  adminPasswordMessage.textContent = "";
}

function checkAdminPassword() {
  if (adminPasswordInput.value === ADMIN_PASSWORD) {
    unlockAdmin();
  } else {
    adminPasswordMessage.textContent = "INCORRECT PASSWORD";
    adminPasswordMessage.className = "message error";
    adminPasswordInput.value = "";
    adminPasswordInput.focus();
  }
}

adminPasswordBtn.addEventListener("click", checkAdminPassword);
adminPasswordInput.addEventListener("keydown", event => {
  if (event.key === "Enter") checkAdminPassword();
});

if (sessionStorage.getItem("apdcAdminUnlocked") === "yes") {
  unlockAdmin();
}
</script>

<script type="module" src="admin.js?v=20260716-ondeck"></script>
</body>
</html>
