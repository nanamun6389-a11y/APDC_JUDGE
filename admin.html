<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#000000">
<title>APDC Admin</title>
<link rel="stylesheet" href="style.css?v=auto-advance-v2">
</head>
<body>
<header><a class="brand brand-link" href="index.html">APDC ADMIN</a></header>
<main>
<section id="adminPasswordGate" class="password-gate">
  <div class="password-box">
    <div class="small-label">APDC ADMIN ACCESS</div>
    <h1>ENTER PASSWORD</h1>
    <input id="adminPasswordInput" type="password" inputmode="numeric" maxlength="4" placeholder="••••">
    <button id="adminPasswordBtn" type="button">ENTER</button>
    <div id="adminPasswordMessage" class="message"></div>
  </div>
</section>

<div id="adminProtected" class="hidden">
<section class="setup-card">
  <div class="small-label">EVENT MANAGEMENT</div>
  <h1>EVENT SETUP</h1>
  <label>SECTION / EVENT<select id="setupEvent"></select></label>
  <label>EVENT NO.<input id="setupEventNumber" type="number" min="1" inputmode="numeric" placeholder="Later"></label>
  <label>ROUND
    <select id="setupRound">
      <option value="quarter">Quarter Final</option>
      <option value="semi">Semi Final</option>
      <option value="final">Final</option>
    </select>
  </label>
  <div class="small-label judge-label">ASSIGNED JUDGES</div>
  <div id="judgeChecks" class="judge-check-grid"></div>
  <div class="assignment-tools">
    <button id="copyPreviousBtn" class="light" type="button">COPY PREVIOUS JUDGES</button>
    <button id="clearJudgesBtn" class="light" type="button">CLEAR ALL</button>
  </div>
  <div class="setup-actions">
    <button id="saveSetupBtn" class="dark" type="button">SAVE ASSIGNMENT</button>
    <button id="startEventBtn" class="dark" type="button">START FIRST EVENT</button>
  </div>
  <div id="setupMessage" class="message"></div>
</section>

<section class="controls">
  <label>SECTION<select id="adminEvent"></select></label>
  <label>ROUND<select id="adminRound">
    <option value="quarter">Quarter Final</option>
    <option value="semi">Semi Final</option>
    <option value="final">Final</option>
  </select></label>
  <label>GROUP<select id="judgeGroup">
    <option value="ALL">All Judges</option>
    <option value="T">T Judges</option>
    <option value="W">W Judges</option>
  </select></label>
</section>

<section class="score">
  <div class="score-head">
    <div><h1 id="adminTitle"></h1><div id="submissionCount" class="muted"></div></div>
    <div id="completeBadge" class="badge">IN PROGRESS</div>
  </div>
  <h2>JUDGES</h2><div id="judgeStatus"></div>
  <h2>RESULT</h2><div id="aggregateResults"></div>
  <div class="admin-actions">
    <button id="exportBtn" class="light">CSV</button>
    <button id="printBtn" class="light">PDF</button>
    <button id="clearBtn" class="light">RESET ROUND</button>
    <button id="resetAllBtn" class="danger">RESET ALL SUBMISSIONS</button>
  </div>
</section>


<section class="auto-advance-card">
  <div>
    <div class="small-label">AUTOMATIC RUNNING ORDER</div>
    <h2>AUTO ADVANCE</h2>
    <p>Moves to the next saved Event No. when every assigned judge has submitted.</p>
  </div>
  <label class="auto-switch">
    <input id="autoAdvanceToggle" type="checkbox" checked>
    <span>ON</span>
  </label>
  <div id="autoAdvanceStatus" class="message">READY</div>
</section>

<section class="on-deck-admin">
  <h2>FLOOR CONTROL</h2>
  <label>NOW<input id="nowEventInput" type="text"></label>
  <label>ON DECK<input id="onDeckEventInput" type="text"></label>
  <label>NEXT<input id="nextEventInput" type="text"></label>
  <div class="control-grid">
    <button id="publishFloorBtn" type="button">PUBLISH</button>
    <button id="advanceFloorBtn" type="button" class="light">ADVANCE →</button>
  </div>
  <div id="floorMessage" class="message"></div>
</section>

<nav class="bottom-nav"><a href="index.html">JUDGE</a><a href="live.html">LIVE</a><a href="qr.html">QR</a></nav>
</div>
</main>
<script type="module" src="admin.js?v=auto-advance-v2"></script>
</body>
</html>
