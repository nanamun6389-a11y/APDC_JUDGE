<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#000000">
<title>APDC Judge</title>
<link rel="stylesheet" href="style.css?v=20260723-timetable-visible">
</head>
<body>
<header style="position:relative"><button id="homeTitleBtn" class="brand brand-button" type="button" aria-label="Return to judge home">APDC JUDGE</button><div id="languageHost" class="language-host"></div></header>

<nav class="top-category-nav apdc-main-nav">
  <a href="control-room.html">DASHBOARD</a>
  <a href="index.html">JUDGE</a>
  <a href="timetable.html" class="timetable-nav-link">TIMETABLE</a>
  <a href="mc.html">MC</a>
  <a href="live.html">LIVE</a>
  <a href="broadcast.html">BROADCAST</a>
  <a href="admin.html">SETTINGS</a>
</nav>


<main>

<section id="passwordGate" class="password-gate">
  <div class="password-box">
    <div class="small-label">APDC JUDGE ACCESS</div>
    <h1>ENTER PASSWORD</h1>
    <input id="passwordInput" type="password" inputmode="numeric" maxlength="4"
           placeholder="••••" autocomplete="off">
    <button id="passwordBtn" type="button">ENTER</button>
    <div id="passwordMessage" class="message"></div>
  </div>
</section>

<div id="judgeProtected" class="hidden" hidden style="display:none">
<section id="judgeGate" class="judge-gate hidden">
    <h1>SELECT JUDGE</h1>
    <div class="judge-group-title">T JUDGES</div>
    <div id="tJudgeButtons" class="judge-grid"></div>

    <div class="judge-group-title">W JUDGES</div>
    <div id="wJudgeButtons" class="judge-grid"></div>
  </section>

  <section id="scoreScreen" class="hidden">
    <div class="selected-judge-bar">
      <div>
        <div class="small-label">CURRENT JUDGE</div>
        <strong id="selectedJudgeName"></strong>
      </div>
      <button id="changeJudgeBtn" type="button">CHANGE JUDGE</button>
    </div>

    <section class="controls two">
      <label>SECTION<select id="eventSelect"></select></label>
      <label>ROUND
        <select id="roundSelect">
          <option value="quarter">Quarter Final · Select 12</option>
          <option value="semi">Semi Final · Select 6</option>
          <option value="final">Final · Rank All</option>
        </select>
      </label>
    </section>

    <div class="status-line">
      <span><span id="connectionDot" class="dot"></span><span id="connectionText">Connecting</span></span>
    </div>

    <section class="score">
      <div class="score-head">
        <div>
          <h1 id="eventTitle"></h1>
          <div id="roundTitle" class="muted"></div>
        </div>
        <div id="counter" class="counter"></div>
      </div>

      <div id="ballot" class="ballot"></div>

      <div class="actions">
        <button id="backBtn" class="light" type="button">← BACK</button>
        <button id="submitBtn" class="dark" type="button">SUBMIT</button>
      </div>
      <div id="message" class="message"></div>
    </section>
  </section>

  
</div>
</main>

<script src="i18n.js?v=20260717-1305"></script>
<script>
if ("serviceWorker" in navigator) { navigator.serviceWorker.getRegistrations().then(rs=>rs.forEach(r=>r.unregister())); }
</script>
<script type="module" src="judge-sync-20260723-v4.js"></script>
</body>
</html>
