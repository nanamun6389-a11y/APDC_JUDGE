<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>APDC Mini Live</title><link rel="stylesheet" href="style.css"></head><body class="live"><main class="livewrap"><div class="livehead"><b>APDC LIVE</b><span id="clock"></span></div><section class="center"><div class="kicker" id="eno"></div><div class="livetitle" id="title"></div><div class="livesub" id="subt"></div><div class="badge" id="status"></div><div class="livepeople" id="people"></div></section><div class="next" id="nextinfo"></div></main>
<script src="shared.js"></script><script>
let E=[],S=load();fetch('events.json').then(r=>r.json()).then(x=>{E=x;render()});function render(){if(!E.length)return;let e=E[S.index];eno.textContent='EVENT '+String(e.no).padStart(2,'0');title.textContent=e.title;subt.textContent=e.subtitle;status.textContent=st(S.status);people.innerHTML=e.competitors.map(x=>'<div class="liveperson">'+x+'</div>').join('');let n=E[S.index+1];nextinfo.innerHTML=n?'NEXT · <b>'+String(n.no).padStart(2,'0')+'. '+n.title+(n.subtitle?' · '+n.subtitle:'')+'</b>':'NEXT · <b>END OF PROGRAM</b>'}sub(s=>{S=s;render()});setInterval(()=>clock.textContent=new Date().toLocaleTimeString('ko-KR'),1000);
</script></body></html>
