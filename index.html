<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#000000">
<title>APDC Judge</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <div class="brand">APDC JUDGE</div>
</header>

<main>
  <section class="controls">
    <label>JUDGE<select id="judgeSelect"></select></label>
    <label>SECTION<select id="eventSelect"></select></label>
    <label>ROUND
      <select id="roundSelect">
        <option value="quarter">Quarter Final · Select 12</option>
        <option value="semi">Semi Final · Select 6</option>
        <option value="final">Final · Rank All</option>
      </select>
    </label>
  </section>

  <div class="status-line">
    <span id="judgeIdentity"></span>
    <span><span id="connectionDot" class="dot"></span><span id="connectionText">Connecting</span></span>
    <span id="judgeLockText"></span>
  </div>

  <section class="score">
    <div class="score-head">
      <div>
        <h1 id="eventTitle"></h1>
        <div id="roundTitle" class="muted"></div>
      </div>
      <div id="counter" class="counter"></div>
    </div>

    <div id="ballot" class="ballot"></div>

    <div class="actions">
      <button id="resetBtn" class="light">RESET</button>
      <button id="submitBtn" class="dark">SUBMIT</button>
    </div>
    <div id="message" class="message"></div>
  </section>

  <nav class="bottom-nav">
    <a href="admin.html">ADMIN</a>
    <a href="live.html">LIVE</a>
    <a href="qr.html">QR</a>
  </nav>
</main>

<script type="module" src="judge.js"></script>
</body>
</html>
