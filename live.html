<header style="position:relative"><div class="brand">APDC LIVE</div><div id="languageHost" class="language-host"></div></header>
<main class="floor-board">
  <section class="floor-block now-block">
    <div class="live-now-meta"><span id="liveEventNo">EVENT —</span><span id="liveRound">—</span></div>
    <div class="floor-label">NOW</div>
    <div id="liveNow" class="floor-event">WAITING</div>
    <div id="liveNowBackNos" class="live-backnos">BACK NO. —</div>
  </section>
  <section class="floor-block">
    <div class="floor-label">ON DECK</div>
    <div id="liveOnDeck" class="floor-event">—</div>
    <div id="liveOnDeckBackNos" class="live-backnos">BACK NO. —</div>
  </section>
  <section class="floor-block">
    <div class="floor-label">NEXT</div>
    <div id="liveNext" class="floor-event">—</div>
    <div id="liveNextBackNos" class="live-backnos">BACK NO. —</div>
  </section>
  <div id="liveUpdated" class="updated-time"></div>
</main>
<script src="i18n.js?v=20260717-1305"></script>
